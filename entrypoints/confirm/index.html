<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Navigation</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #1a1a2e;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: #16213e;
        border-radius: 12px;
        padding: 32px;
        max-width: 500px;
        width: 100%;
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      }
      h1 { font-size: 24px; margin-bottom: 16px; color: #e94560; }
      .url { 
        background: #0f3460; 
        padding: 16px; 
        border-radius: 8px; 
        word-break: break-all;
        margin-bottom: 24px;
        font-family: monospace;
        font-size: 14px;
      }
      button {
        width: 100%;
        padding: 14px 24px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        font-weight: 600;
        cursor: pointer;
        background: #e94560;
        color: #fff;
        transition: all 0.2s;
      }
      button:hover { background: #d1304a; }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Navigation Blocked</h1>
      <p>Вы пытаетесь перейти на:</p>
      <div class="url" id="url"></div>
      <button id="confirm">Перейти</button>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
